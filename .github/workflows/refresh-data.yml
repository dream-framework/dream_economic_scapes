name: Refresh live economic data and deploy Pages

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. This runs daily at 10:17 UTC.
    - cron: '17 10 * * *'
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-live-feed
  cancel-in-progress: true

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install live-feed dependencies
        run: pip install -r scripts/requirements.txt

      - name: Refresh live World Bank feed
        run: python scripts/fetch_worldbank.py

      - name: Commit refreshed data to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/econ_latest.json data/source_audit.json
          git commit -m "chore(data): refresh live economic feed" || echo "No live data changes to commit"
          git push origin HEAD:main || echo "Nothing to push"

      - name: Prepare static site artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp index.html _site/
          cp -R assets _site/assets
          cp -R data _site/data
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
